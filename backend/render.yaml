# One-click deploy config for Render.com (https://render.com).
# In the Render dashboard: New > Blueprint > point at this repo's /backend.
services:
  - type: web
    name: usmlewise-christ-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"
      # For persistent data add a Render Postgres instance and set:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: usmlewise-db
      #     property: connectionString
